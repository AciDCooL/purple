name: Build Static Offline Binary
on: [workflow_dispatch]

jobs:
  build:
    name: Build for RHEL 8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          # This guarantees we get the v2.6.0 version you requested
          repository: erickochen/purple
          ref: v2.6.0

      - name: Compile Natively inside Alpine Linux Container
        # Alpine uses musl by default. We install the static OpenSSL headers,
        # build the binary, and tell it to output a completely static file.
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace rust:alpine sh -c "
            apk add --no-cache musl-dev gcc openssl-dev openssl-libs-static pkgconfig &&
            OPENSSL_STATIC=1 RUSTFLAGS='-C target-feature=+crt-static' cargo build --release &&
            chmod -R 777 target
          "

      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: purple-rhel8-offline
          path: target/release/purple
