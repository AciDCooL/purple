name: Build and Release Static RHEL 8 Binary

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag for the release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write  # This is required to create a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Force OpenSSL Vendoring
        run: cargo add openssl --features vendored

      - name: Build static binary using cross
        run: cross build --release --target x86_64-unknown-linux-musl

      # Rename the binary so it's clear what it is in the release
      - name: Prepare Release Asset
        run: |
          mkdir -p release_assets
          cp target/x86_64-unknown-linux-musl/release/purple release_assets/purple-linux-x86_64-static

      - name: Upload Artifact (Internal)
        uses: actions/upload-artifact@v4
        with:
          name: purple-static-linux
          path: release_assets/purple-linux-x86_64-static

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          body: "Static RHEL 8 compatible binary generated via manual workflow."
          files: release_assets/purple-linux-x86_64-static
          draft: false
          prerelease: false
