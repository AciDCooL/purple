name: Build Static RHEL 8 Binary
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Force OpenSSL Vendoring
        run: cargo add openssl --features vendored

      - name: Build static binary using cross
        run: cross build --release --target x86_64-unknown-linux-musl

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purple-static-linux
          path: target/x86_64-unknown-linux-musl/release/purple
