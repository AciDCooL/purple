name: Build Static RHEL 8 Binary
on:
  workflow_dispatch: # Allows you to run this manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl C-compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purple-static-linux
          path: target/x86_64-unknown-linux-musl/release/purple
