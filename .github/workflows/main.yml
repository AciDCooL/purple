name: Build Static Offline Binary
on: [workflow_dispatch]

jobs:
  build:
    name: Build for RHEL 8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Install musl C compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
          
      - name: Force OpenSSL Vendoring
        run: |
          sed -i 's/openssl = "\([^"]*\)"/openssl = { version = "\1", features = ["vendored"] }/g' Cargo.toml
          
      - name: Compile Static Binary
        env:
          TARGET_CC: x86_64-linux-musl-gcc
          OPENSSL_NO_VENDOR: ""
        run: cargo build --release --target x86_64-unknown-linux-musl
        
      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: purple-rhel8-offline
          path: target/x86_64-unknown-linux-musl/release/purple
