name: Build Static RHEL 8 Binary
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust musl target
        run: rustup target add x86_64-unknown-linux-musl

      # Added pkg-config and libssl-dev which are sometimes needed even for musl builds
      - name: Install musl C-compiler & dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools pkg-config libssl-dev

      # Added the OPENSSL_STATIC and PKG_CONFIG_ALLOW_CROSS variables
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
        env:
          OPENSSL_STATIC: 1
          PKG_CONFIG_ALLOW_CROSS: 1
          # The openssl-sys crate has a "vendored" feature. We can force it via Cargo.
          # We can also explicitly tell it to vendor OpenSSL for the musl target.
          CC_x86_64_unknown_linux_musl: musl-gcc
          CXX_x86_64_unknown_linux_musl: g++

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purple-static-linux
          path: target/x86_64-unknown-linux-musl/release/purple
