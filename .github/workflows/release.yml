name: Release

on:
  push:
    tags:
      - "v*" # Triggers on any tag starting with v (e.g., v1.0.1)
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross-Compilation Tools
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary
        run: |
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package Binary
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          ARCHIVE="purple-${VERSION}-${{ matrix.target }}.tar.gz"
          
          # Move to the build folder to zip the binary
          cd target/${{ matrix.target }}/release
          tar -czf ../../../"${ARCHIVE}" purple
          cd ../../..
          
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: purple-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          body: "Automated release of purple binary for ${{ github.event.inputs.tag || github.ref_name }}"
          files: |
            purple-*/*.tar.gz
            purple-*/*.sha256
