Host space-in-path
  HostName 10.0.0.1
  IdentityFile "~/my key/id_ed25519"
  CertificateFile "~/.purple/certs/space host-cert.pub"

Host hash-in-value
  HostName 10.0.0.2
  IdentityFile "~/id #note"

Host internal-quotes
  HostName 10.0.0.3
  ProxyCommand ssh -W "%h:%p" gateway

Host mixed
  HostName "a b"
  User "deploy user"
  ProxyJump "jump host"
